name: Post Beta Changelog to Discord

on:
  push:
    branches:
      - main
    paths:
      - "newt-beta/CHANGELOG.md"

jobs:
  post_beta_changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract latest changelog block
        id: changelog
        shell: bash
        run: |
          # Henter siste versjonsblokk fra CHANGELOG.md[cite: 2]
          changelog_block=$(awk '
            BEGIN { found=0 }
            /^## 🔹 Version / {
              if (found) exit;
              found=1;
              print $0;
              next;
            }
            found {
              if (/^## /) exit;
              print $0;
            }
          ' newt-beta/CHANGELOG.md)

          # Sikker escaping for JSON-format
          changelog_block=$(echo "$changelog_block" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "BLOCK=$changelog_block" >> "$GITHUB_OUTPUT"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK_BETA }}
          ROLE_ID: "1498952905334587443"
        shell: bash
        run: |
          # Vi bruker en variabel for meldingen for å holde curl-kommandoen ren
          MSG_CONTENT="<@&$ROLE_ID> New beta-update is ready! 🚀"
          
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"username\": \"Newt Beta Changelog Bot\",
            \"content\": \"$MSG_CONTENT\",
            \"embeds\": [{
              \"title\": \"🧪 Beta Changelog Update\",
              \"description\": \"${{ steps.changelog.outputs.BLOCK }}\",
              \"color\": 3447003
            }]
          }" \
          "$DISCORD_WEBHOOK"
