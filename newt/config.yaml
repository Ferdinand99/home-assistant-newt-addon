name: "Newt Add-on (Beta)"
version: "1.10.2-beta1"
slug: "newt-beta"
description: "Beta testing av Newt med forbedret sikkerhet"
icon: "icon.png"
arch:
  - amd64
  - armv7
  - armhf
  - aarch64
startup: system
boot: auto
host_network: true
# Vi fjerner SYS_ADMIN og DAC_READ_SEARCH for å se om Newt klarer seg med kun nettverkstilgang
privileged:
  - NET_ADMIN
  - NET_RAW
options:
  PANGOLIN_ENDPOINT: "https://example.com"
  NEWT_ID: "your_newt_id"
  NEWT_SECRET: "your_newt_secret"
  custom_env_vars: []
schema:
  PANGOLIN_ENDPOINT: "str"
  NEWT_ID: "str"
  NEWT_SECRET: "str"
  custom_env_vars:
    - "match(^[A-Z_][A-Z0-9_]*=.+$)\"
map:
  - config:rw
# Nedjusterer API-tilgang for å se om det påvirker ratingen
hassio_api: true
homeassistant_api: false
auth_api: false
hassio_role: "default"